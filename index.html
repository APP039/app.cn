<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>先做一个垃圾出来</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #333;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .title {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #222;
            font-size: 12px;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="loading">Loading...</div>
        <div class="title">
            先做一个垃圾出来<br>
            <span style="font-size: 10px; color: #333;">Make a piece of trash first</span>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // 场景设置
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        document.querySelector('.loading').style.display = 'none';
        
        // 相机位置
        camera.position.set(0, 0, 5);
        
        // 轨道控制器
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.5;
        controls.enableZoom = true;
        controls.enablePan = false;
        
        // 创建纸张揉团的函数
        function createPaperBall() {
            // 基础球体几何体
            const geometry = new THREE.SphereGeometry(1, 32, 32);
            
            // 修改顶点创建不规则的揉纸效果
            const positions = geometry.attributes.position.array;
            for (let i = 0; i < positions.length; i += 3) {
                const noise = (Math.random() - 0.5) * 0.3;
                const factor = 0.8 + Math.random() * 0.4;
                positions[i] *= factor + noise;
                positions[i + 1] *= factor + noise;
                positions[i + 2] *= factor + noise;
            }
            geometry.attributes.position.needsUpdate = true;
            geometry.computeVertexNormals();
            
            // 创建纸张纹理
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const context = canvas.getContext('2d');
            
            // 纸张底色
            context.fillStyle = '#f8f8f8';
            context.fillRect(0, 0, 512, 512);
            
            // 添加纸张纹理
            for (let i = 0; i < 100; i++) {
                context.strokeStyle = `rgba(200, 200, 200, ${Math.random() * 0.3})`;
                context.lineWidth = Math.random() * 2;
                context.beginPath();
                context.moveTo(Math.random() * 512, Math.random() * 512);
                context.lineTo(Math.random() * 512, Math.random() * 512);
                context.stroke();
            }
            
            // 添加折痕
            for (let i = 0; i < 20; i++) {
                context.strokeStyle = `rgba(180, 180, 180, ${Math.random() * 0.5})`;
                context.lineWidth = Math.random() * 3 + 1;
                context.beginPath();
                const startX = Math.random() * 512;
                const startY = Math.random() * 512;
                context.moveTo(startX, startY);
                context.quadraticCurveTo(
                    Math.random() * 512, Math.random() * 512,
                    Math.random() * 512, Math.random() * 512
                );
                context.stroke();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            
            // 创建材质
            const material = new THREE.MeshPhongMaterial({
                map: texture,
                color: 0xffffff,
                shininess: 30,
                transparent: true,
                opacity: 0.95
            });
            
            const paperBall = new THREE.Mesh(geometry, material);
            paperBall.castShadow = true;
            paperBall.receiveShadow = true;
            
            return paperBall;
        }
        
        // 创建纸张揉团
        const paperBall = createPaperBall();
        scene.add(paperBall);
        
        // 添加发光效果
        const glowGeometry = new THREE.SphereGeometry(1.2, 32, 32);
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: 0x4a90e2,
            transparent: true,
            opacity: 0.1,
            side: THREE.BackSide
        });
        const glow = new THREE.Mesh(glowGeometry, glowMaterial);
        scene.add(glow);
        
        // 添加边缘发光
        const edgeGeometry = new THREE.EdgesGeometry(paperBall.geometry);
        const edgeMaterial = new THREE.LineBasicMaterial({ 
            color: 0x6bb6ff, 
            transparent: true, 
            opacity: 0.3 
        });
        const edges = new THREE.LineSegments(edgeGeometry, edgeMaterial);
        paperBall.add(edges);
        
        // 灯光设置
        const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 5, 5);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);
        
        const pointLight = new THREE.PointLight(0x4a90e2, 0.5, 10);
        pointLight.position.set(-3, 2, 3);
        scene.add(pointLight);
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 自动旋转
            paperBall.rotation.x += 0.003;
            paperBall.rotation.y += 0.005;
            
            // 发光效果动画
            glow.material.opacity = 0.05 + Math.sin(Date.now() * 0.001) * 0.05;
            edges.material.opacity = 0.2 + Math.sin(Date.now() * 0.002) * 0.1;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // 开始动画
        animate();
    </script>
</body>
</html>
